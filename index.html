<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>極簡番茄鐘</title>
    <meta
      name="description"
      content="極簡純前端番茄鐘工作法計時器，可在倒數結束時顯示 Google 廣告插槽。"
    />
    <link rel="stylesheet" href="./styles.css" />

    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1345288817198016"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main class="app" aria-label="番茄鐘計時器">
      <section class="timer-panel">
        <div class="status-row">
          <span class="mode-pill" id="modeLabel">專注</span>
          <span class="round-count" id="roundLabel">第 1 輪</span>
        </div>

        <div class="time" id="timeDisplay" aria-live="polite">25:00</div>

        <div class="progress" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="controls" aria-label="計時控制">
          <button class="primary" id="startPauseButton" type="button">開始</button>
          <button id="resetButton" type="button">重設</button>
          <button id="skipButton" type="button">跳過</button>
        </div>
      </section>

      <section class="settings" aria-label="番茄鐘設定">
        <label>
          <span>專注</span>
          <input id="focusInput" type="number" min="1" max="180" value="25" />
          <span>分鐘</span>
        </label>
        <label>
          <span>短休息</span>
          <input id="shortBreakInput" type="number" min="1" max="60" value="5" />
          <span>分鐘</span>
        </label>
        <label>
          <span>長休息</span>
          <input id="longBreakInput" type="number" min="1" max="120" value="15" />
          <span>分鐘</span>
        </label>
        <label>
          <span>長休息間隔</span>
          <input id="longBreakEveryInput" type="number" min="2" max="12" value="4" />
          <span>輪</span>
        </label>
      </section>
    </main>

    <dialog class="ad-dialog" id="adDialog" aria-labelledby="adTitle">
      <div class="ad-shell">
        <div class="ad-header">
          <h2 id="adTitle">本輪已完成</h2>
          <span id="nextModeLabel">準備休息</span>
        </div>

        <div class="ad-slot" id="adSlot">
          <!--
            Google AdSense 廣告插槽設定：
            data-ad-client 請填你的 publisher ID。
            data-ad-slot 請填你的 ad slot ID。
          -->
          <ins
            class="adsbygoogle"
            style="display:block"
            data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
            data-ad-slot="0000000000"
            data-ad-format="auto"
            data-full-width-responsive="true"
          ></ins>
          <p class="ad-placeholder" id="adPlaceholder">Google 廣告插槽預留區</p>
        </div>

        <div class="ad-actions">
          <span id="adCountdown">5 秒後可繼續</span>
          <button id="continueButton" type="button" disabled>繼續</button>
        </div>
      </div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
